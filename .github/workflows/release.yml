---
# yamllint disable rule:line-length
name: Release

"on":
  release:
    types:
      - published

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      major_minor_version: ${{ steps.release.outputs.major_minor_version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      latest_tag: ${{ steps.release.outputs.latest_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from Cargo.toml
        id: release
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3 | cut -d- -f1)
          prerelease=$(echo "$version" | grep -c '-')

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major_minor_version=$major.$minor" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$prerelease" >> "$GITHUB_OUTPUT"

          latest_tag=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name')
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Check tag matches Cargo.toml version
        if: github.event.release.tag_name != format('v{0}', steps.release.outputs.version)
        run: |
          echo "Tag ${{ github.event.release.tag_name }} does not match Cargo.toml version v${{ steps.release.outputs.version }}"
          exit 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  metadata:
    needs: check-release
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Set docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.HARBOR_HOST }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.check-release.outputs.version }}
            type=raw,value=${{ github.event.release.prerelease == false && needs.check-release.outputs.major_minor_version || '' }}
            type=raw,value=${{ github.event.release.prerelease == true && 'preview' || 'stable' }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
          flavor: |
            latest=${{ needs.check-release.outputs.latest_tag == github.event.release.tag_name }}

  publish-docker-image:
    uses: ./.github/workflows/ci-docker-image.yml
    secrets: inherit
    needs:
      - test
      - metadata
    with:
      publish: true
      ref: ${{ github.sha }}
      tags: ${{ needs.metadata.outputs.tags }}
      labels: ${{ needs.metadata.outputs.labels }}

  publish-binaries:
    needs: test
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: infrahub-git-credential-helper-linux-amd64
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: infrahub-git-credential-helper-linux-arm64
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: infrahub-git-credential-helper-darwin-arm64
            setup: ""
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact: infrahub-git-credential-helper-darwin-amd64
            setup: ""
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build dependencies
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          tar -czf ${{ matrix.artifact }}.tar.gz \
            -C target/${{ matrix.target }}/release \
            infrahub-git-credential infrahub-git-askpass

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz
