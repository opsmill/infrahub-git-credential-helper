---
name: Build And Push Docker image

"on":
  workflow_call:
    inputs:
      publish:
        type: boolean
        description: Whether to publish the image to the registry
        required: false
        default: false
      ref:
        type: string
        required: true
        description: The git ref to build from
      tags:
        type: string
        required: true
        description: The tags for the docker image
      labels:
        type: string
        required: true
        description: The labels for the docker image

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref }}
  cancel-in-progress: true

env:
  DOCKERFILE: "Dockerfile"
  REGISTRY_IMAGE: ${{ vars.HARBOR_HOST }}/${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        if: ${{ inputs.publish }}
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          provenance: false
          platforms: ${{ matrix.platform }}
          labels: ${{ inputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ inputs.publish }}

      - name: Export digest
        if: ${{ inputs.publish }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          TAGS: ${{ inputs.tags }}
        run: |
          tag_args=$(echo "$TAGS" | xargs printf -- '--tag %s\n')
          digest_args=$(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
          docker buildx imagetools create $tag_args $digest_args
