query GetRepoCredential($location: String!) {
  CoreGenericRepository(location__value: $location) {
    edges {
      node {
        __typename
        id
        credential {
          node {
            __typename
            id
            ... on CorePasswordCredential {
              username {
                value
              }
              password {
                value
              }
            }
          }
        }
      }
    }
  }
}
